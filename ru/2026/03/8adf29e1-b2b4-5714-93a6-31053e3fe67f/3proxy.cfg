setgid 103
setuid 101

nserver 8.8.8.8
nserver 77.88.8.8
nscache 65536
timeouts 1 5 30 60 180 1800 15 60

daemon

log /var/log/3proxy/3proxy.log D
logformat "- +_L%t.%. %N.%p %E %U %C:%c %R:%r %O %I %h %T"
rotate 30

auth strong
users "user01:CL:pa$$word"
users "user02:CL:pa$$word"
users "user03:CL:pa$$word"

proxy -p3128 -i0.0.0.0
socks -p1080 -i0.0.0.0
