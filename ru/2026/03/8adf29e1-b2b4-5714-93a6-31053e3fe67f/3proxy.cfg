setgid 103
setuid 101
nserver 1.1.1.1
nserver 8.8.8.8
nserver 77.88.8.8
nscache 65536
timeouts 1 5 30 60 180 1800 15 60
dnspr

# log /var/log/3proxy/3proxy.log D
# logformat "- +_L%t.%. %N.%p %E %U %C:%c %R:%r %O %I %h %T"
# rotate 30

users $/usr/local/etc/3proxy/users.cfg

auth strong
deny * * 127.0.0.1
allow *
proxy -p3128 -i0.0.0.0
socks -p1080 -i0.0.0.0
flush
